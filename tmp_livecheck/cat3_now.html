                "@type": "BlogPosting",
                "headline": "CAN 2025 : le titre retiré au Sénégal et attribué au Maroc",
                "description": "&lt;p&gt;La Conf&amp;eacute;d&amp;eacute;ration africaine de football (CAF) a tranch&amp;eacute;. Dans un communiqu&amp;eacute; publi&amp;eacute; mardi 17 mars 2026, l&amp;rsquo;instance dirigeante du football africain a jug&amp;eacute; recevable et fond&amp;eacute; le recours introduit par la F&amp;eacute;d&amp;eacute;ration royale marocaine de football (FRMF), remettant en cause le sacre du S&amp;eacute;n&amp;eacute;gal.&lt;/p&gt;
&lt;p&gt;En cause, une violation pr&amp;eacute;sum&amp;eacute;e des articles 82 et 84 du r&amp;egrave;glement de la CAF. L&amp;rsquo;instance reproche notamment aux joueurs s&amp;eacute;n&amp;eacute;galais d&amp;rsquo;avoir quitt&amp;eacute; la pelouse lors de la finale. Une attitude jug&amp;eacute;e contraire aux r&amp;egrave;gles, qui entra&amp;icirc;ne une sanction imm&amp;eacute;diate : la d&amp;eacute;faite du S&amp;eacute;n&amp;eacute;gal sur tapis vert (3-0), au profit du Maroc, d&amp;eacute;sormais d&amp;eacute;sign&amp;eacute; champion d&amp;rsquo;Afrique.&lt;/p&gt;
&lt;p&gt;Une d&amp;eacute;cision qui passe mal &amp;agrave; Dakar. Dans un communiqu&amp;eacute; officiel, la F&amp;eacute;d&amp;eacute;ration s&amp;eacute;n&amp;eacute;galaise de football (FSF) exprime &amp;laquo; une profonde indignation &amp;raquo; et fustige une mesure &amp;laquo; inique, sans pr&amp;eacute;c&amp;eacute;dent et inacceptable &amp;raquo;. Elle estime que cette d&amp;eacute;cision nuit gravement &amp;agrave; l&amp;rsquo;image et &amp;agrave; la cr&amp;eacute;dibilit&amp;eacute; du football africain.&lt;/p&gt;
&lt;p&gt;Sans tarder, la FSF a annonc&amp;eacute; son intention de porter l&amp;rsquo;affaire devant le Tribunal arbitral du sport (TAS) de Lausanne. L&amp;rsquo;instance entend obtenir l&amp;rsquo;annulation de cette d&amp;eacute;cision et affirme rester mobilis&amp;eacute;e pour la d&amp;eacute;fense des int&amp;eacute;r&amp;ecirc;ts du football s&amp;eacute;n&amp;eacute;galais.&lt;/p&gt;
&lt;p&gt;&lt;strong&gt;L&amp;rsquo;int&amp;eacute;gralit&amp;eacute; du communiqu&amp;eacute; de la FSF est &amp;agrave; lire ci-apr&amp;egrave;s.&lt;/strong&gt;&lt;/p&gt;
