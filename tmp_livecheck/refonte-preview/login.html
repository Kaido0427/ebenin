<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Apercu Connexion</title>
  <link rel="stylesheet" href="/public/css/refonte-public.css">
</head>
<body>
  <section class="auth-shell" style="padding:0;">
    <div class="auth-page" style="min-height:100vh;border-radius:0;">
      <div class="auth-visual">
        <div class="auth-visual__logo"><img src="/public/images/ebenins.png" alt="logo" class="logo__img--light"></div>
        <div class="auth-visual__body">
          <div class="auth-visual__tag">Plateforme journaliste</div>
          <h1 class="auth-visual__title">Rejoignez la voix du Benin numerique</h1>
          <p class="auth-visual__desc">Publiez, partagez et informez des milliers de lecteurs chaque jour.</p>
          <div class="auth-visual__stats"><div class="auth-stat"><div class="auth-stat__val">14K+</div><div class="auth-stat__label">Lecteurs</div></div><div class="auth-stat"><div class="auth-stat__val">380+</div><div class="auth-stat__label">Journalistes</div></div><div class="auth-stat"><div class="auth-stat__val">6200</div><div class="auth-stat__label">Articles</div></div></div>
        </div>
      </div>
      <div class="auth-form-panel">
        <div class="auth-form-wrap">
          <div class="auth-form-wrap__head"><h1>Bon retour !</h1><p>Pas encore de compte ? <a href="#">S'inscrire gratuitement</a></p></div>
          <div class="auth-card">
            <form class="comment-form">
              <label>Adresse e-mail</label>
              <input type="email" placeholder="exemple@email.com">
              <label>Mot de passe</label>
              <input type="password" placeholder="Votre mot de passe">
              <button class="btn btn--primary" style="justify-content:center;" type="button">Se connecter</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
